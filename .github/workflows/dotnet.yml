name: dotnet build & test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  issues: read
  checks: write

jobs:
  run:
    runs-on: [ self-hosted, ubuntu-latest ]

    steps:
      - uses: actions/checkout@v3

      - name: Install .NET 9.0 (Local)
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 9.0 --install-dir ./local-dotnet
          echo "$(pwd)/local-dotnet" >> $GITHUB_PATH

      - name: Restore dependencies
        run: ./local-dotnet/dotnet restore Itmo.ObjectOrientedProgramming.sln

      - name: Build
        run: ./local-dotnet/dotnet build Itmo.ObjectOrientedProgramming.sln --no-restore --configuration Release

      - name: Test
        run: ./local-dotnet/dotnet test Itmo.ObjectOrientedProgramming.sln --no-build --configuration Release
